name: ci

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  web-and-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workspace deps
        run: pnpm install --no-frozen-lockfile

      - name: Build web
        run: pnpm build:web

      - name: Validate canonical catalog
        run: python scripts/catalog_pipeline.py validate

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Web dependency audit
        run: npm audit --audit-level=high --omit=dev --prefix apps/web

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit canonical Python services
        run: |
          pip-audit -r services/api/requirements.txt
          pip-audit -r services/ai_concierge/requirements.txt
          pip-audit -r services/date_night_ai/requirements.txt
          pip-audit -r services/user_profile_engine/requirements.txt

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke dependencies
        run: python -m pip install requests passlib sqlalchemy "psycopg[binary]"

      - name: Build and start stack
        run: docker compose -f infrastructure/docker/docker-compose.yml up --build -d

      - name: Wait for HTTP health
        run: |
          python - <<'PY'
          import sys
          import time
          import requests

          urls = [
              "http://localhost:8000/health",
              "http://localhost:8007/health",
              "http://localhost:8008/health",
              "http://localhost:8009/health",
          ]

          for url in urls:
              for _ in range(60):
                  try:
                      data = requests.get(url, timeout=5).json()
                      if data.get("status") == "ok":
                          break
                  except Exception:
                      time.sleep(2)
              else:
                  sys.exit(f"health check failed for {url}")
          PY

      - name: Seed curated couple profile
        run: python scripts/seed_couple_profile.py

      - name: Run curated couple smoke flow
        run: python scripts/smoke_couple_flow.py

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infrastructure/docker/docker-compose.yml logs --tail=200
